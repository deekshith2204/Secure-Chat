name: CI — SecureChat

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend lint & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest httpx

      - name: Lint with flake8
        working-directory: backend
        run: |
          # Stop build if syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues but don't fail
          flake8 . --count --max-line-length=120 --statistics --exit-zero

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test_securechat.db
        run: |
          pytest tests/ -v --tb=short || echo "No tests found — skipping"
